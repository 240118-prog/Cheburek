<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Firebase Control Panel</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        button#mainBtn { 
            background: #007bff; color: white; border: none; padding: 12px; 
            border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; 
        }
        button#mainBtn:disabled { background: #ccc; cursor: not-allowed; }

        .post { 
            background: #fff; border: 1px solid #eaeaea; padding: 15px; 
            margin-top: 15px; border-radius: 8px; width: 100%; 
            max-width: 500px; position: relative; 
        }
        
        .like-btn { 
            cursor: pointer; border: none; background: #f8f9fa; 
            padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; 
        }
        .like-btn:hover { background: #e2e6ea; }

        /* Стиль для кнопки удаления */
        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none; color: #ff4d4d;
            cursor: pointer; font-weight: bold; font-size: 18px;
            line-height: 1; padding: 5px;
        }
        .delete-btn:hover { color: #cc0000; transform: scale(1.1); }

        .time { font-size: 11px; color: #999; float: right; margin-right: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        // Импортируем необходимые модули Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import {
            getFirestore, collection, addDoc, query, orderBy, onSnapshot,
            serverTimestamp, updateDoc, doc, increment, deleteDoc
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyDSf0hSPBpu6rHElBKIqqunBHjxfB4hwFI",
            authDomain: "qweqwe-1c8f2.firebaseapp.com",
            projectId: "qweqwe-1c8f2",
            storageBucket: "qweqwe-1c8f2.firebasestorage.app",
            messagingSenderId: "34409553978",
            appId: "1:34409553978:web:ddbfc3527809d0bd2c9503",
            measurementId: "G-255LJP74J4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. ФУНКЦИЯ: АТОМАРНОЕ ОБНОВЛЕНИЕ (Лайки)
        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                // Используем increment для предотвращения ошибок при одновременных нажатиях
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) {
                console.error("Ошибка при лайке:", e.message);
            }
        };

        // 2. ФУНКЦИЯ: УДАЛЕНИЕ ДОКУМЕНТА (Новая)
        window.deletePost = async (id) => {
            if(confirm("Удалить эту запись навсегда?")) {
                try {
                    await deleteDoc(doc(db, "requests", id));
                } catch (e) {
                    alert("Ошибка: У вас нет прав на удаление.");
                    console.error(e);
                }
            }
        };

        // МЕТОД: ЗАПИСЬ С ПРОВЕРКОЙ ПОЛЕЙ
        document.getElementById('mainBtn').onclick = async () => {
            const nameEl = document.getElementById('name');
            const emailEl = document.getElementById('email');
            const btn = document.getElementById('mainBtn');

            // Простая валидация на клиенте
            if (!nameEl.value.trim() || !emailEl.value.trim()) {
                alert("Пожалуйста, заполните все поля.");
                return;
            }

            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name: nameEl.value,
                    email: emailEl.value,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                // Очистка полей после успеха
                emailEl.value = "";
                nameEl.value = "";
            } catch (e) {
                alert("Ошибка безопасности: Данные отклонены сервером (проверьте Rules в Firebase).");
            }
            btn.disabled = false;
        };

        // МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                // Форматируем время (защита от null, пока timestamp летит с сервера)
                const timeString = data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "...";
                
                feed.innerHTML += `
                    <div class="post">
                        <button class="delete-btn" onclick="deletePost('${doc.id}')" title="Удалить">×</button>
                        <span class="time">${timeString}</span>
                        <b>${data.name}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
