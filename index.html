<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватный Чат</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        .auth-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; box-sizing: border-box; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Сообщения */
        .messages-box { height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; border-radius: 8px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; word-wrap: break-word; }
        .sent { background: #007bff; color: white; align-self: flex-end; }
        .received { background: #e4e6eb; color: black; align-self: flex-start; }
        
        /* Список пользователей */
        .user-card { padding: 12px; border: 1px solid #eee; margin-bottom: 8px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .user-card:hover { background: #f0f7ff; border-color: #007bff; }
        .user-card img { width: 35px; height: 35px; border-radius: 50%; }
        
        .chat-input-group { display: flex; gap: 5px; }
        .plane-btn { width: 60px; background: #007bff; font-size: 20px; padding: 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="authSection">
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" style="display: none;" class="auth-bar">
            <img id="userPhoto" class="user-avatar" src="">
            <span id="userName"></span>
            <button id="logoutBtn" style="background: #ff4757; margin-left: auto; width: auto; padding: 8px 15px;">Выйти</button>
        </div>
    </div>

    <div id="mainContent" style="display: none; width: 100%; max-width: 500px;">
        <div class="container">
            <h3 style="margin-top:0">Выберите собеседника:</h3>
            <div id="usersList">Загрузка активных пользователей...</div>
        </div>

        <div id="chatBox" class="container" style="display: none;">
            <h4 id="withWho" style="margin-top:0">Чат</h4>
            <div id="messagesDisplay" class="messages-box"></div>
            <div class="chat-input-group">
                <input type="text" id="dmMsg" placeholder="Введите сообщение...">
                <button id="sendBtn" class="plane-btn">✈</button>
            </div>
        </div>

        <div id="messageForm" class="container">
            <h3 style="margin-top:0">Общая лента</h3>
            <input type="text" id="content" placeholder="Что нового?">
            <button id="mainBtn">Опубликовать</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSf0hSPBpu6rHElBKIqqunBHjxfB4hwFI",
            authDomain: "qweqwe-1c8f2.firebaseapp.com",
            projectId: "qweqwe-1c8f2",
            storageBucket: "qweqwe-1c8f2.firebasestorage.app",
            messagingSenderId: "34409553978",
            appId: "1:34409553978:web:ddbfc3527809d0bd2c9503"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let activeChatId = null;
        let chatUnsub = null;

        // Авторизация и регистрация пользователя в базе
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;

                // Записываем данные в коллекцию users
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName,
                    photo: user.photoURL,
                    uid: user.uid
                });
                loadUserList();
            } else {
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Загрузка списка всех, кто зашел в приложение
        function loadUserList() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('usersList');
                list.innerHTML = "";
                snap.forEach(uDoc => {
                    const u = uDoc.data();
                    if (u.uid === auth.currentUser.uid) return; // Себя не показываем
                    
                    const div = document.createElement('div');
                    div.className = 'user-card';
                    div.innerHTML = `<img src="${u.photo}"> <span>${u.name}</span>`;
                    div.onclick = () => startChat(u.uid, u.name);
                    list.appendChild(div);
                });
            });
        }

        // Логика выбора собеседника и загрузки истории
        window.startChat = (targetId, targetName) => {
            const myId = auth.currentUser.uid;
            
            // Генерируем ID чата так, чтобы он был одинаковым для обоих (сортировка)
            activeChatId = myId < targetId ? myId + "_" + targetId : targetId + "_" + myId;
            
            document.getElementById('chatBox').style.display = 'block';
            document.getElementById('withWho').innerText = "Чат с: " + targetName;
            
            if (chatUnsub) chatUnsub();

            // Подписка на сообщения (уже с индексом)
            const q = query(
                collection(db, "dms"), 
                where("chatId", "==", activeChatId), 
                orderBy("timestamp", "asc")
            );

            chatUnsub = onSnapshot(q, (snap) => {
                const display = document.getElementById('messagesDisplay');
                display.innerHTML = "";
                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const side = m.sender === myId ? 'sent' : 'received';
                    const div = document.createElement('div');
                    div.className = `msg ${side}`;
                    div.innerText = m.text;
                    display.appendChild(div);
                });
                display.scrollTop = display.scrollHeight;
            }, (err) => {
                console.error("Ошибка чата:", err);
            });
        };

        // Отправка сообщения по нажатию на самолет
        async function doSend() {
            const input = document.getElementById('dmMsg');
            const val = input.value.trim();
            
            if (!val || !activeChatId) return;

            try {
                await addDoc(collection(db, "dms"), {
                    chatId: activeChatId,
                    sender: auth.currentUser.uid,
                    text: val,
                    timestamp: serverTimestamp()
                });
                input.value = "";
            } catch (e) {
                console.error("Ошибка отправки:", e);
            }
        }

        document.getElementById('sendBtn').onclick = doSend;
        document.getElementById('dmMsg').onkeyup = (e) => { if(e.key === 'Enter') doSend(); };

    </script>
</body>
</html>
